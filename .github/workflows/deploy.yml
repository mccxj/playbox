name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  issue_comment:
    types: [created]

jobs:
  build:
    if: |
      github.event_name != 'issue_comment' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/ci'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test
