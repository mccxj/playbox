name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install code-review-graph
        run: |
          pip install code-review-graph
          code-review-graph install --platform opencode
      - name: Build code-review-graph
        run: code-review-graph build
      - name: Write global AGENTS.md
        run: |
          mkdir -p ~/.config
          echo '## Approach' > ~/.config/AGENTS.md
          echo '- Think before acting. Read existing files before writing code.' >> ~/.config/AGENTS.md
          echo '- Be concise in output but thorough in reasoning.' >> ~/.config/AGENTS.md
          echo '- Prefer editing over rewriting whole files.' >> ~/.config/AGENTS.md
          echo '- Do not re-read files you have already read unless the file may have changed.' >> ~/.config/AGENTS.md
          echo '- Test your code before declaring done.' >> ~/.config/AGENTS.md
          echo '- No sycophantic openers or closing fluff.' >> ~/.config/AGENTS.md
          echo '- Keep solutions simple and direct.' >> ~/.config/AGENTS.md
          echo '- User instructions always override this file.' >> ~/.config/AGENTS.md
      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
        with:
          model: x-openai/z-ai/glm5
