name: opencode
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

  parallel_setup:
    runs-on: ubuntu-latest
    needs: opencode
    strategy:
      matrix:
        environment: [node, python]  # 设置并行执行 Node.js 和 Python 环境配置
    steps:
      - name: Setup Node.js
        if: matrix.environment == 'node'
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python
        if: matrix.environment == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

  install_dependencies:
    runs-on: ubuntu-latest
    needs: parallel_setup
    steps:
      - name: Install Node.js dependencies
        run: npm ci
        if: success()  # 只有在前面步骤成功时才运行

      - name: Install code-review-graph
        run: |
          pip install code-review-graph
          code-review-graph install --platform opencode
        if: success()

  build_and_run:
    runs-on: ubuntu-latest
    needs: install_dependencies
    steps:
      - name: Build code-review-graph
        run: code-review-graph build

      - name: Write global AGENTS.md
        run: |
          mkdir -p ~/.config/opencode
          cat > ~/.config/opencode/AGENTS.md << 'EOF'
          ## Approach
          - Think before acting. Read existing files before writing code.
          - Be concise in output but thorough in reasoning.
          - Prefer editing over rewriting whole files.
          - Do not re-read files you have already read unless the file may have changed.
          - Skip files over 100KB unless explicitly required.
          - Suggest running /cost when a session is running long to monitor cache ratio.
          - Recommend starting a new session when switching to an unrelated task.
          - Test your code before declaring done.
          - No sycophantic openers or closing fluff.
          - Keep solutions simple and direct.
          - User instructions always override this file.
          EOF

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
        with:
          model: x-openai/LongCat-Flash-Thinking
